spring.application.name=cafeteria

# ── PostgreSQL + pgvector ──
spring.datasource.url=jdbc:postgresql://localhost:5432/cafeteria
spring.datasource.username=postgres
spring.datasource.password=232801
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ── n8n ──
n8n.webhook.url=http://localhost:5678/webhook/pergunta
n8n.webhook.timeout-ms=120000

# ── CORS ──
app.cors.allowed-origin=http://localhost:5173

# ── Gemini ──
gemini.base-url=https://generativelanguage.googleapis.com
gemini.api-key=
gemini.embedding.model=gemini-embedding-001

# ── Logging ──
logging.level.serratec.cafeteria=INFO
logging.level.org.springframework.web=INFO
