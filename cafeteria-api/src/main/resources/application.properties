spring.application.name=cafeteria

# ── PostgreSQL + pgvector ──
spring.datasource.url=jdbc:postgresql://localhost:5432/cafeteria
spring.datasource.username=postgres
spring.datasource.password=SUA_SENHA_AQUI
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ── n8n ──
n8n.webhook.url=http://localhost:5678/webhook/pergunta
n8n.webhook.timeout-ms=120000

# ── CORS ──
app.cors.allowed-origin=http://localhost:5173

# ── Ollama ──
ollama.base-url=http://localhost:11434
ollama.embedding.model=nomic-embed-text
ollama.embedding.dimensions=768

# ── Logging ──
logging.level.serratec.cafeteria=INFO
logging.level.org.springframework.web=INFO
